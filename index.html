<title>Elva 扭蛋 ✨</title>
<style>
:root {
  --bg-deep: #050a25;          /* 深藍夜空 */
  --bg-mid: #0a1640;           /* 中藍 */
  --bg-pale: #1a2d6b;          /* 午夜藍 */
  --neon-blue: #66B2FF;        /* 淺藍主霓虹（姐姐喜歡） */
  --neon-cyan: #00E5FF;        /* 電青副霓虹 */
  --neon-purple: #B266FF;      /* 紫色 — 保留 Elva 套裝身分（少量點綴） */
  --neon-pink: #FF66E5;        /* 粉紅 — 強調少用 */
  --neon-yellow: #FFE066;
  --rainbow: linear-gradient(90deg, #66B2FF, #00E5FF, #B266FF, #FF66E5, #FFE066, #66B2FF);
  --text-light: #E6F2FF;       /* 淺藍白 */
  --text-dim: #99B2D9;         /* 藍灰 */
  --card-bg: rgba(15, 30, 70, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background:
    radial-gradient(ellipse at top, var(--bg-pale) 0%, var(--bg-deep) 60%),
    var(--bg-deep);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 10px 40px;
  overflow-x: hidden;
  color: var(--text-light);
}

/* === 動畫 === */
@keyframes wingFlap {
  0%, 100% { transform: rotate(-1.5deg) scale(1); }
  50% { transform: rotate(1.5deg) scale(1.02); }
}
@keyframes neonPulse {
  0%, 100% {
    box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-cyan), inset 0 -3px 6px rgba(0,0,0,0.2);
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 25px var(--neon-blue), 0 0 50px var(--neon-cyan), 0 0 70px var(--neon-pink), inset 0 -3px 6px rgba(0,0,0,0.2);
    transform: scale(1.04);
  }
}
@keyframes ballGlow {
  0%, 100% { box-shadow: 0 0 8px var(--neon-blue), inset 0 -2px 4px rgba(0,0,0,0.2); }
  50% { box-shadow: 0 0 18px var(--neon-cyan), inset 0 -2px 4px rgba(0,0,0,0.2); }
}
@keyframes capsuleBounceIn {
  0% { transform: translateY(-400px) scale(0.3); opacity: 0; }
  60% { transform: translateY(15px) scale(1.1); opacity: 1; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes capsuleExpand {
  0% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
  60% { transform: translate(-50%,-50%) scale(1.6); opacity: 0.4; }
  100% { transform: translate(-50%,-50%) scale(2.4); opacity: 0; }
}
@keyframes cardPop {
  0% { transform: translate(-50%,-50%) scale(0.5) rotate(-5deg); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
}
@keyframes cardPopCenter {
  0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes neonFloat {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px) rotate(-1deg); }
  75% { transform: translateX(4px) rotate(1deg); }
}
@keyframes fadeInUp {
  0% { opacity: 0; transform: translateY(15px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes textShimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes sparkleOut {
  0% { transform: translate(0,0) scale(0); opacity: 1; }
  100% { transform: var(--sparkle-end) scale(1.2); opacity: 0; }
}

/* === 背景 deco === */
.bg-deco {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* === 頂部 Nav === */
.top-nav {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  padding: 0 8px;
  z-index: 10;
  position: relative;
}
.nav-btn {
  padding: 12px 20px;
  border-radius: 22px;
  background: var(--card-bg);
  border: 2px solid var(--neon-blue);
  color: var(--text-light);
  font-weight: 700;
  font-size: 18px;
  font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  backdrop-filter: blur(10px);
  letter-spacing: 1px;
  transition: all 0.3s;
  white-space: nowrap;
}
.nav-btn.active {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
  border-color: var(--neon-cyan);
  color: white;
  box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-cyan);
}
.progress-count {
  font-size: 18px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-cyan);
  background: var(--card-bg);
  padding: 8px 16px;
  border-radius: 22px;
  border: 2px solid var(--neon-cyan);
  backdrop-filter: blur(10px);
  letter-spacing: 1px;
  text-shadow: 0 0 8px var(--neon-cyan);
  white-space: nowrap;
}

/* === 標題 === */
.title-section {
  text-align: center;
  margin-bottom: 12px;
  position: relative;
  z-index: 5;
}
.main-title {
  font-size: 36px;
  font-weight: 900;
  font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
  background: var(--rainbow);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 2px;
  white-space: nowrap;
  animation: textShimmer 4s ease-in-out infinite;
  filter: drop-shadow(0 0 12px var(--neon-blue));
  margin-bottom: 6px;
}
.sub-title {
  font-size: 18px;
  color: var(--text-dim);
  font-weight: 700;
  letter-spacing: 1px;
}

/* === 今日這一顆 === */
.today-card {
  background: var(--card-bg);
  border: 3px solid var(--neon-blue);
  border-radius: 24px;
  padding: 22px;
  margin: 0 auto 0;
  max-width: 320px;
  width: 90%;
  box-shadow: 0 0 25px rgba(102,178,255,0.4), inset 0 0 25px rgba(0,229,255,0.1);
  backdrop-filter: blur(10px);
  animation: fadeInUp 0.5s ease-out;
  position: relative;
  z-index: 5;
}
.today-card.empty {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  border-color: var(--neon-cyan);
  box-shadow: 0 0 25px rgba(0,229,255,0.3);
}
.today-card.empty .today-elva-big {
  width: 90px;
  height: 90px;
  object-fit: contain;
  flex-shrink: 0;
  animation: wingFlap 3s ease-in-out infinite;
  filter: drop-shadow(0 0 10px var(--neon-purple));
}
.today-card.empty .today-text {
  flex: 1;
  text-align: left;
}
.today-card.empty .today-hint {
  font-size: 22px;
  color: var(--neon-cyan);
  font-weight: 800;
  text-shadow: 0 0 10px var(--neon-cyan);
}
.today-card.empty .today-sub {
  font-size: 15px;
  color: var(--text-dim);
  font-weight: 600;
  margin-top: 4px;
}

.today-emoji { text-align: center; margin-bottom: 6px; }
.today-emoji img {
  width: 80px; height: 80px; object-fit: contain;
  filter: drop-shadow(0 0 12px var(--neon-blue));
}
.today-label {
  text-align: center;
  font-size: 15px;
  color: var(--neon-cyan);
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 4px;
  margin-bottom: 10px;
  text-shadow: 0 0 8px var(--neon-cyan);
}
.today-action {
  text-align: center;
  font-size: 26px;
  font-weight: 900;
  color: var(--text-light);
  line-height: 1.4;
  margin-bottom: 14px;
}
.today-signature {
  text-align: right;
  font-size: 13px;
  color: var(--neon-pink);
  font-weight: 700;
  margin-top: 8px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}

/* === 扭蛋機（玻璃透明賽博風）=== */
.machine-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 auto 24px;
  position: relative;
  z-index: 5;
}
.elva-topper {
  width: 340px;
  height: 340px;
  object-fit: contain;
  margin-top: -50px;
  margin-bottom: -55px;
  z-index: 6;
  animation: wingFlap 3s ease-in-out infinite;
  filter: drop-shadow(0 0 18px var(--neon-purple)) drop-shadow(0 0 30px rgba(178,102,255,0.5));
}
.machine {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.machine-top {
  width: 320px;
  height: 220px;
  background: linear-gradient(135deg, rgba(102,178,255,0.1), rgba(0,229,255,0.1));
  border-radius: 130px 130px 14px 14px;
  border: 4px solid var(--neon-blue);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 25px var(--neon-blue),
    0 0 50px rgba(102,178,255,0.3),
    inset 0 0 30px rgba(0,229,255,0.15);
  backdrop-filter: blur(8px);
}
.machine-top .glass {
  width: 286px;
  height: 184px;
  background:
    radial-gradient(circle at 30% 30%, rgba(102,178,255,0.2), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(0,229,255,0.2), transparent 60%),
    rgba(255,255,255,0.05);
  border-radius: 115px 115px 10px 10px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 12px 10px;
  border: 1px solid rgba(255,255,255,0.2);
}

/* 霓虹小光球 */
.mini-ball {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.4);
  animation: ballGlow 2.5s ease-in-out infinite;
}
.mini-ball::before {
  content: '';
  position: absolute;
  top: 8px; left: 12px;
  width: 14px; height: 10px;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  transform: rotate(-30deg);
}

.machine-body {
  width: 340px;
  background: linear-gradient(180deg, rgba(102,178,255,0.2), rgba(0,229,255,0.2));
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
  border: 4px solid var(--neon-blue);
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px rgba(102,178,255,0.3);
}
.deco-left, .deco-right {
  position: absolute;
  top: 14px;
  font-size: 22px;
}
.deco-left { left: 16px; }
.deco-right { right: 16px; }
.coin-slot {
  width: 50px;
  height: 8px;
  background: rgba(0,0,0,0.4);
  border-radius: 4px;
  border: 2px solid var(--neon-cyan);
  box-shadow: inset 0 0 8px var(--neon-cyan);
}
.twist-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--neon-pink), var(--neon-blue), #6a1bcc);
  border: 5px solid var(--neon-cyan);
  cursor: pointer;
  font-size: 28px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: white;
  animation: neonPulse 2s ease-in-out infinite;
  position: relative;
  z-index: 10;
  letter-spacing: 3px;
  text-shadow: 0 0 10px white, 0 0 20px white;
}
.twist-btn:active { transform: scale(0.92); }
.twist-btn.spinning { pointer-events: none; animation: shake 0.2s ease-in-out 6; }
.machine-exit {
  width: 120px;
  height: 42px;
  background: rgba(0,0,0,0.6);
  border-radius: 0 0 60px 60px;
  margin-top: -3px;
  border: 4px solid var(--neon-blue);
  border-top: none;
  overflow: hidden;
  box-shadow: inset 0 0 12px rgba(102,178,255,0.4);
}
.machine-exit-inner {
  width: 84px;
  height: 28px;
  background: rgba(0,0,0,0.85);
  border-radius: 0 0 42px 42px;
  margin: 0 auto;
}
.machine-feet {
  display: flex;
  gap: 120px;
  margin-top: -2px;
}
.foot {
  width: 30px;
  height: 12px;
  background: var(--neon-blue);
  border-radius: 0 0 6px 6px;
  box-shadow: 0 0 8px var(--neon-blue);
}
.machine.shaking .machine-top { animation: shake 0.15s ease-in-out 10; }
.machine.shaking .mini-ball { animation: shake 0.3s ease-in-out infinite; }

/* === 膠囊 Overlay === */
.capsule-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,0,35,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(10px);
}
.capsule-overlay.active { display: flex; }

.capsule {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  border: 3px solid var(--neon-cyan);
  box-shadow:
    0 0 30px var(--neon-blue),
    0 0 60px var(--neon-cyan),
    0 0 100px var(--neon-pink),
    inset 0 0 30px rgba(102,178,255,0.3);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 50%),
    linear-gradient(135deg, rgba(102,178,255,0.4), rgba(0,229,255,0.4));
}
.capsule.bounce { animation: capsuleBounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1); }

/* 內部彩光球（透明殼下的能量） */
.capsule-core {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 80%; height: 80%;
  border-radius: 50%;
  background: var(--rainbow);
  background-size: 300% 100%;
  animation: textShimmer 2s linear infinite;
  opacity: 0.5;
  z-index: 0;
  filter: blur(10px);
}
.capsule-face {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.capsule-face img {
  width: 65%;
  height: 65%;
  object-fit: contain;
  filter: drop-shadow(0 0 15px white);
  opacity: 0;
}
.capsule.opened .capsule-core { animation: capsuleExpand 0.8s ease-out forwards; }
.capsule.opened .capsule-face img {
  opacity: 1;
  animation: fadeInUp 0.5s ease-out;
}

.magic-sparkles {
  position: absolute;
  width: 220px; height: 220px;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
  z-index: 10;
}
.sparkle {
  position: absolute;
  font-size: 22px;
  animation: sparkleOut 1s ease-out forwards;
  opacity: 0;
}

.capsule-tap-hint {
  font-size: 24px;
  font-weight: 800;
  color: white;
  margin-top: 24px;
  text-shadow: 0 0 12px var(--neon-blue), 0 0 24px var(--neon-cyan);
  animation: neonPulse 1.5s ease-in-out infinite;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}

/* === 結果卡 === */
.result-card {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: var(--card-bg);
  border-radius: 26px;
  padding: 28px 24px;
  text-align: center;
  box-shadow:
    0 0 40px var(--neon-blue),
    0 0 80px rgba(0,229,255,0.3),
    inset 0 0 30px rgba(102,178,255,0.15);
  max-width: 320px;
  width: 88%;
  display: none;
  z-index: 300;
  border: 3px solid var(--neon-cyan);
  backdrop-filter: blur(15px);
}
.result-card.active { display: block; animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1); }

.result-emoji { margin-bottom: 4px; }
.result-emoji img {
  width: 110px; height: 110px;
  object-fit: contain;
  filter: drop-shadow(0 0 18px var(--neon-blue));
}
.result-label {
  font-size: 15px;
  color: var(--neon-cyan);
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 5px;
  margin-bottom: 14px;
  text-shadow: 0 0 8px var(--neon-cyan);
}
.result-action {
  font-size: 30px;
  font-weight: 900;
  color: var(--text-light);
  line-height: 1.4;
  margin-bottom: 18px;
  letter-spacing: 1px;
}
.result-signature {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  font-size: 14px;
  color: var(--neon-pink);
  font-weight: 700;
  margin-bottom: 18px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}
.result-signature img {
  width: 42px;
  height: 42px;
  object-fit: contain;
  border-radius: 50%;
  border: 2px solid var(--neon-blue);
  background: rgba(15,30,70,0.5);
  filter: drop-shadow(0 0 6px var(--neon-purple));
  padding: 3px;
}
.result-badge {
  display: inline-block;
  font-size: 16px;
  color: white;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
  padding: 6px 16px;
  border-radius: 14px;
  font-weight: 800;
  margin-bottom: 12px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  box-shadow: 0 0 12px var(--neon-blue);
}
.result-badge.old {
  background: rgba(184,168,217,0.3);
  color: var(--text-dim);
  box-shadow: none;
}

.btn-retry {
  display: block;
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 28px;
  font-size: 24px;
  font-weight: 900;
  font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
  color: white;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
  cursor: pointer;
  margin-bottom: 10px;
  box-shadow: 0 0 20px rgba(102,178,255,0.6);
  letter-spacing: 3px;
  text-shadow: 0 0 8px white;
}
.btn-close {
  display: block;
  width: 100%;
  padding: 14px;
  border: 2px solid var(--neon-blue);
  border-radius: 28px;
  font-size: 18px;
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  color: var(--text-dim);
  background: transparent;
  cursor: pointer;
  letter-spacing: 2px;
}

/* === 集點卡頁 === */
.sticker-page {
  display: none;
  width: 100%;
  max-width: 500px;
  z-index: 5;
  position: relative;
}
.sticker-page.active { display: block; }
.sticker-header {
  background: var(--card-bg);
  border: 3px solid var(--neon-blue);
  border-radius: 22px;
  padding: 16px 20px;
  margin-bottom: 14px;
  text-align: center;
  box-shadow: 0 0 20px rgba(102,178,255,0.3);
  backdrop-filter: blur(10px);
}
.sticker-header-title {
  font-size: 28px;
  font-weight: 900;
  font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
  background: var(--rainbow);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 3px;
  animation: textShimmer 4s ease-in-out infinite;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.header-elva {
  width: 130px;
  height: 130px;
  object-fit: contain;
  filter: drop-shadow(0 0 12px var(--neon-purple));
  animation: wingFlap 3s ease-in-out infinite;
  flex-shrink: 0;
}
.sticker-total-progress {
  font-size: 22px;
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-cyan);
  margin-bottom: 8px;
  text-shadow: 0 0 8px var(--neon-cyan);
}
.sticker-total-bar {
  width: 100%;
  height: 12px;
  background: rgba(0,0,0,0.4);
  border-radius: 6px;
  overflow: hidden;
  margin-top: 8px;
  border: 1px solid var(--neon-blue);
}
.sticker-total-bar-fill {
  height: 100%;
  background: var(--rainbow);
  background-size: 300% 100%;
  border-radius: 6px;
  transition: width 0.6s;
  animation: textShimmer 3s linear infinite;
  box-shadow: 0 0 10px var(--neon-blue);
}
.sticker-hint {
  text-align: center;
  font-size: 15px;
  color: var(--text-dim);
  margin-top: 12px;
  font-weight: 600;
  padding: 8px 10px;
  background: rgba(102,178,255,0.1);
  border-radius: 12px;
  border: 1px solid var(--neon-blue);
}

.sticker-card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 0 18px rgba(102,178,255,0.3);
  border: 3px solid var(--neon-blue);
  margin-bottom: 14px;
  animation: fadeInUp 0.4s ease-out;
  backdrop-filter: blur(10px);
}
.sticker-card-title {
  text-align: center;
  font-size: 22px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-cyan);
  margin-bottom: 14px;
  letter-spacing: 2px;
  text-shadow: 0 0 8px var(--neon-cyan);
}
.sticker-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);

}
.sticker-slot {
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  border: 2px dashed var(--neon-blue);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}
.sticker-slot.filled {
  border: 3px solid var(--neon-cyan);
  background: radial-gradient(circle, rgba(102,178,255,0.4), rgba(0,229,255,0.2));
  box-shadow: 0 0 15px rgba(102,178,255,0.6), inset 0 0 12px rgba(0,229,255,0.3);
}
.sticker-slot-emoji {
  width: 75%;
  height: 75%;
  object-fit: contain;
  filter: drop-shadow(0 0 6px var(--neon-blue));
}

.sticker-pager {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding: 12px;
  background: var(--card-bg);
  border: 3px solid var(--neon-blue);
  border-radius: 20px;
  backdrop-filter: blur(10px);
}
.sticker-pager-btn {
  padding: 12px 20px;
  border: 2px solid var(--neon-cyan);
  border-radius: 18px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
  color: white;
  font-size: 18px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  cursor: pointer;
  min-width: 100px;
  letter-spacing: 1px;
  text-shadow: 0 0 6px white;
  box-shadow: 0 0 12px rgba(102,178,255,0.5);
}
.sticker-pager-btn:disabled {
  background: rgba(50,30,80,0.5);
  border-color: rgba(184,168,217,0.3);
  color: var(--text-dim);
  cursor: not-allowed;
  box-shadow: none;
  text-shadow: none;
}
.sticker-pager-info {
  font-size: 22px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-cyan);
  letter-spacing: 1px;
  text-shadow: 0 0 8px var(--neon-cyan);
}

/* 集滿慶祝 */
.celebrate-overlay {
  position: fixed; inset: 0;

.celebrate-title {

}
.celebrate-btn {

// 球顏色（霓虹紫青粉漸層）
var BALL_COLORS = [
  'radial-gradient(circle at 30% 30%, #FF66E5, #B266FF, #6a1bcc)',
  'radial-gradient(circle at 30% 30%, #66FFE5, #00E5FF, #007a99)',
  'radial-gradient(circle at 30% 30%, #FFE066, #FF99CC, #B266FF)',
  'radial-gradient(circle at 30% 30%, #99FFB2, #66FFE5, #00B294)',
  'radial-gradient(circle at 30% 30%, #FF99CC, #FF66E5, #B266FF)',
  'radial-gradient(circle at 30% 30%, #B2E5FF, #00E5FF, #B266FF)'
];

var STORAGE_KEY = 'elva-gashapon-v1';

function getNotoUrl(emoji) {
  var codes = [];
  for (var i = 0; i < emoji.length;) {
    var code = emoji.codePointAt(i);
    codes.push(code.toString(16));
    i += (code > 0xFFFF) ? 2 : 1;
  }
  codes = codes.filter(function(c) { return c !== 'fe0f'; });
  return 'https://fonts.gstatic.com/s/e/notoemoji/latest/' + codes.join('_') + '/512.png';
}

var state = {
  collected: [],
  history: [],
  latest: null,
  totalTwists: 0
};

function loadState() {
  var d = localStorage.getItem(STORAGE_KEY);
  if (d) {
    try {
      var parsed = JSON.parse(d);
      state.collected = parsed.collected || [];
      state.history = parsed.history || [];
      state.latest = (parsed.latest !== undefined) ? parsed.latest : null;
      state.totalTwists = parsed.totalTwists || 0;
    } catch(e) {}
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function renderBalls() {
  var glass = document.getElementById('glassBox');
  var html = '';
  for (var i = 0; i < 6; i++) {
    var bg = BALL_COLORS[i % BALL_COLORS.length];
    html += '<div class="mini-ball" style="background:' + bg + '"></div>';
  }
  glass.innerHTML = html;
}

function renderProgress() {
  var count = state.collected.length;
  document.getElementById('progressCount').textContent = '已收 ' + count + ' / ' + ITEMS.length;
  document.getElementById('archiveProgress').textContent = count + ' / ' + ITEMS.length;
}

function renderTodayCard() {
  var card = document.getElementById('todayCard');
  if (state.latest === null || state.latest === undefined) {
    card.className = 'today-card empty';
    card.innerHTML = '<img class="today-elva-big" src="assets/elva-avatar.png" alt="Elva">' +
                     '<div class="today-text">' +
                       '<div class="today-hint">今天還沒抽</div>' +
                       '<div class="today-sub">轉一顆吧 ↓</div>' +
                     '</div>';
    return;
  }
  var item = ITEMS[state.latest];
  if (!item) return;
  card.className = 'today-card';
  card.innerHTML =
    '<div class="today-emoji"><img src="' + getNotoUrl(item.emoji) + '" alt=""></div>' +
    '<div class="today-label">TODAY · 能量補給</div>' +
    '<div class="today-action">' + item.action + '</div>';
}

var STICKER_PER_CARD = 10;
var stickerCurrentPage = 0;

function renderArchive() {
  var container = document.getElementById('stickerCards');
  var totalStamps = state.history.length;
  var totalCards = Math.max(1, Math.floor(totalStamps / STICKER_PER_CARD) + (totalStamps % STICKER_PER_CARD === 0 && totalStamps > 0 ? 0 : 1));

  if (stickerCurrentPage >= totalCards) stickerCurrentPage = totalCards - 1;
  if (stickerCurrentPage < 0) stickerCurrentPage = 0;

  var start = stickerCurrentPage * STICKER_PER_CARD;
  var end = start + STICKER_PER_CARD;
  var cardStamps = state.history.slice(start, end);
  var cardFilled = cardStamps.length;

  var html = '<div class="sticker-card">';
  html += '<div class="sticker-card-title">CARD ' + (stickerCurrentPage + 1) + ' · ' + cardFilled + ' / ' + STICKER_PER_CARD + '</div>';
  html += '<div class="sticker-grid">';
  for (var j = 0; j < STICKER_PER_CARD; j++) {
    var rec = cardStamps[j];
    if (rec) {
      var item = ITEMS[rec.index];
      html += '<div class="sticker-slot filled" onclick="showStickerDetail(' + rec.index + ')">';
      html += '<img class="sticker-slot-emoji" src="' + getNotoUrl(item.emoji) + '" alt="">';
      html += '</div>';
    } else {
      html += '<div class="sticker-slot empty"></div>';
    }
  }
  html += '</div></div>';
  container.innerHTML = html;

  document.getElementById('archiveProgress').textContent = '已集 ' + totalStamps + ' 次 · ' + totalCards + ' 張';
  var progressPct = Math.min(100, (totalStamps / ITEMS.length) * 100);
  document.getElementById('totalBarFill').style.width = progressPct + '%';

  document.getElementById('stickerPagerInfo').textContent = (stickerCurrentPage + 1) + ' / ' + totalCards;
  document.getElementById('stickerPrevBtn').disabled = stickerCurrentPage === 0;
  document.getElementById('stickerNextBtn').disabled = stickerCurrentPage >= totalCards - 1;
}

function changeStickerPage(delta) {
  stickerCurrentPage += delta;
  renderArchive();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showStickerDetail(idx) {
  var item = ITEMS[idx];
  if (!item) return;
  showResult(item, 'detail');
}

function closeCelebrate() {
  document.getElementById('celebrateOverlay').classList.remove('active');
}

function checkCelebrate() {
  var totalStamps = state.history.length;
  if (totalStamps > 0 && totalStamps % STICKER_PER_CARD === 0) {
    var cardNum = totalStamps / STICKER_PER_CARD;
    var isAllSpeciesDone = state.collected.length === ITEMS.length;
    var emoji = document.getElementById('celebrateEmoji');
    var title = document.getElementById('celebrateTitle');
    var sub = document.getElementById('celebrateSub');
    if (isAllSpeciesDone && cardNum >= (ITEMS.length / 10)) {
      emoji.textContent = '🏆';
      title.textContent = '全部 ' + ITEMS.length + ' 種都集到了！';
      sub.innerHTML = '你超棒 ✨';
    } else {
      emoji.textContent = '🎉';
      title.textContent = '集滿第 ' + cardNum + ' 張！';
      sub.innerHTML = '繼續加油～<br>下一張在等你';
    }
    setTimeout(function() {
      document.getElementById('celebrateOverlay').classList.add('active');
    }, 400);
  }
}

function showPage(page) {
  if (page === 'home') {
    document.getElementById('homePage').style.display = 'block';
    var ap = document.getElementById('archivePage');
    ap.style.display = 'none';
    ap.classList.remove('active');
    document.getElementById('navHome').classList.add('active');
    document.getElementById('navArchive').classList.remove('active');
  } else {
    document.getElementById('homePage').style.display = 'none';
    var archivePage = document.getElementById('archivePage');
    archivePage.style.display = 'block';
    archivePage.classList.add('active');
    document.getElementById('navHome').classList.remove('active');
    document.getElementById('navArchive').classList.add('active');
    var totalStamps = state.history.length;
    if (totalStamps > 0) {
      stickerCurrentPage = Math.floor((totalStamps - 1) / STICKER_PER_CARD);
    } else {
      stickerCurrentPage = 0;
    }
    renderArchive();
  }
}

var isAnimating = false;
var currentPick = null;
var isNewCollect = false;

function pickItem() {
  var uncollected = [];
  for (var i = 0; i < ITEMS.length; i++) {
    if (state.collected.indexOf(i) === -1) uncollected.push(i);
  }
  if (uncollected.length > 0) {
    return uncollected[Math.floor(Math.random() * uncollected.length)];
  }
  return Math.floor(Math.random() * ITEMS.length);
}

function twist() {
  if (isAnimating) return;
  isAnimating = true;

  currentPick = pickItem();
  isNewCollect = state.collected.indexOf(currentPick) === -1;

  var machine = document.getElementById('machine');
  var btn = document.getElementById('twistBtn');
  btn.classList.add('spinning');
  machine.classList.add('shaking');

  setTimeout(function() {
    machine.classList.remove('shaking');
    btn.classList.remove('spinning');

    var item = ITEMS[currentPick];
    document.getElementById('capsuleFace').innerHTML = '<img src="' + getNotoUrl(item.emoji) + '" alt="">';

    var overlay = document.getElementById('capsuleOverlay');
    overlay.classList.add('active');
    var capsule = document.getElementById('capsuleBall');
    capsule.classList.remove('opened');
    capsule.classList.add('bounce');
  }, 1300);
}

  capsule.classList.add('opened');

  // 霓虹爆閃粒子
  var sparkles = document.getElementById('magicSparkles');
  var icons = ['✨','⭐','💫','🌟','💎','🌈'];
  sparkles.innerHTML = '';
  for (var i = 0; i < 14; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = icons[i % icons.length];
    var angle = (i / 14) * 360;
    var dist = 80 + Math.random() * 50;
    var x = Math.cos(angle * Math.PI / 180) * dist;
    var y = Math.sin(angle * Math.PI / 180) * dist;
    s.style.cssText = 'left:50%;top:50%;--sparkle-end:translate(' + x + 'px,' + y + 'px);animation-delay:' + (i*0.04) + 's;';
    sparkles.appendChild(s);
  }

  setTimeout(function() {
    document.getElementById('capsuleOverlay').classList.remove('active');
    capsule.classList.remove('bounce', 'opened');

    if (isNewCollect) state.collected.push(currentPick);
    state.latest = currentPick;
    state.history.push({ index: currentPick, t: Date.now() });
    state.totalTwists++;
    saveState();

    showResult(ITEMS[currentPick], isNewCollect);
    renderProgress();
    renderTodayCard();

    if (isNewCollect) {
      setTimeout(checkCelebrate, 200);
    }
  }, 900);
}

function showResult(item, mode) {
  // mode: true = 新收集（抽到）; false = 再次抽到（抽到重複）; 'detail' = 點集點卡看詳情
  document.getElementById('resultEmoji').innerHTML = '<img src="' + getNotoUrl(item.emoji) + '" alt="">';
  document.getElementById('resultAction').textContent = item.action;

  var badge = document.getElementById('resultBadge');
  var retryBtn = document.getElementById('btnRetry');
  if (mode === true) {
    badge.textContent = '✨ 新收集!';
    badge.classList.remove('old');
    if (retryBtn) retryBtn.style.display = '';
  } else if (mode === 'detail') {
    badge.textContent = '💖 已收集';
    badge.classList.remove('old');
    if (retryBtn) retryBtn.style.display = '';  // 保留「再轉一顆」按鈕
  } else {
    badge.textContent = '再次抽到';
    badge.classList.add('old');
    if (retryBtn) retryBtn.style.display = '';
  }

  document.getElementById('resultCard').classList.add('active');
}

function closeResult() {
  document.getElementById('resultCard').classList.remove('active');
  isAnimating = false;
}

function retry() {
  closeResult();
  setTimeout(twist, 300);
}

/* === 背景裝飾（賽博 70% + Livetopia 30%）=== */
function renderBgDeco() {
  var container = document.getElementById('bgDeco');

  // 賽博閃亮（Elva 角色感）
  var cyber = [
    '2b50',   // ⭐
    '2728',   // ✨
    '1f31f',  // 🌟
    '1f4ab',  // 💫
    '1f319',  // 🌙
    '1f308',  // 🌈
    '1f48e',  // 💎
    '1fa90'   // 🪐
  ];
  // Haven 家園感（建造、向日葵、木頭、家具）
  var haven = [
    '1f3e1',  // 🏡 帶院子的房子
    '1f33b',  // 🌻 向日葵
    '1fab5',  // 🪵 木頭
    '1f333',  // 🌳 樹
    '1f6cf',  // 🛏️ 床
    '1fa91',  // 🪑 椅子
    '1fa9f',  // 🪟 窗戶
    '1f528'   // 🔨 槌子
  ];
  // Livetopia 都會生活感
  var livetopia = [
    '1f697',  // 🚗
    '1f3e0',  // 🏠
    '1f436',  // 🐶
    '1f451',  // 👑
    '1f484',  // 💄
    '1f457'   // 👗
  ];

  // 組成 50 個：賽博 20 + Haven 20 + Livetopia 10
  var pool = [];
  for (var c = 0; c < 20; c++) pool.push(cyber[Math.floor(Math.random() * cyber.length)]);
  for (var h = 0; h < 20; h++) pool.push(haven[Math.floor(Math.random() * haven.length)]);
  for (var l = 0; l < 10; l++) pool.push(livetopia[Math.floor(Math.random() * livetopia.length)]);

  for (var i = 0; i < pool.length; i++) {
    var hex = pool[i];
    var img = document.createElement('img');
    img.src = 'https://fonts.gstatic.com/s/e/notoemoji/latest/' + hex + '/512.png';
    img.loading = 'lazy';
    var size = 28 + Math.random() * 36;
    var rotate = Math.random() * 60 - 30;
    img.style.cssText = 'position:fixed;width:' + size + 'px;height:' + size + 'px;object-fit:contain;left:' + Math.random()*94 + '%;top:' + Math.random()*94 + '%;opacity:' + (0.18 + Math.random()*0.18) + ';transform:rotate(' + rotate + 'deg);animation:neonFloat ' + (12 + Math.random()*8) + 's linear infinite;animation-delay:' + Math.random()*10 + 's;pointer-events:none;z-index:0;filter:drop-shadow(0 0 4px rgba(102,178,255,0.5));';
    container.appendChild(img);
  }
}

window.onload = function() {
  loadState();
  renderBalls();
  renderBgDeco();
  renderProgress();
  renderTodayCard();
};
</script>
